<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: url("https://raw.githubusercontent.com/itzs1m/birthday-heart/main/eggfeleciano.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 0;
}

.heart {
  font-size: 260px;
  cursor: pointer;
  display: inline-block;
  animation: heartbeat 1.2s infinite;
  transition: opacity .5s;
  position: relative;
  z-index: 2;
}

.heart:hover {
  transform: scale(1.2);
}

.message {
  display:none;
  text-align:center;
  animation:fadeIn 1.5s ease-in-out;
  position:relative;
  z-index:2;
  max-width:700px;
  padding:20px;
}

.message h1 {
  font-size:40px;
  text-shadow:0 4px 20px rgba(0,0,0,.9);
}

.message p {
  font-size:20px;
  text-shadow:0 2px 10px rgba(0,0,0,.8);
}

#puzzle {
  margin-top:25px;
}

input {
  width:220px;
  padding:10px;
  margin:8px;
  border:none;
  border-radius:10px;
  text-align:center;
  font-size:16px;
}

button {
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:16px;
}

#videoLink{
  display:none;
  margin-top:20px;
}

#wrong{
  display:none;
  color:#ffb3b3;
}

a{
  color:pink;
  text-decoration:none;
  font-size:20px;
}

@keyframes heartbeat{
  0%{transform:scale(1)}
  20%{transform:scale(1.25)}
  40%{transform:scale(1)}
  60%{transform:scale(1.25)}
  80%{transform:scale(1)}
  100%{transform:scale(1)}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div id="heart" class="heart">❤️</div>

<div id="message" class="message">

<h1>Happy Birthday ❤️</h1>

<p>You are amazing and I hope you like this gift.</p>

<div id="puzzle">

<h2>One little puzzle first 👀</h2>

<p>1. The little white chaos queen:</p>
<input id="q1" placeholder="?">

<p>2. Her favourite crime scene:</p>
<input id="q2" placeholder="?">

<p>3. What we apparently became in this photo:</p>
<input id="q3" placeholder="?">

<br>

<button onclick="checkAnswers()">Unlock ❤️</button>

<p id="wrong">
Not quite... try again 👀
</p>

<a id="videoLink"
href="YOUR_YOUTUBE_LINK_HERE"
target="_blank">

Watch this ❤️

</a>

</div>

</div>

<audio id="music">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

document.getElementById("heart").onclick=function(){

document.getElementById("heart").style.opacity="0";

setTimeout(()=>{
document.getElementById("heart").style.display="none";
document.getElementById("message").style.display="block";
},500);

document.getElementById("music").play();

};

function checkAnswers(){

const q1=document.getElementById("q1").value.trim().toLowerCase();
const q2=document.getElementById("q2").value.trim().toLowerCase();
const q3=document.getElementById("q3").value.trim().toLowerCase();

if(
q1==="luna" &&
q2==="nose" &&
q3==="eggs"
){

document.getElementById("videoLink").style.display="block";
document.getElementById("wrong").style.display="none";

}
else{

document.getElementById("wrong").style.display="block";

}

}

</script>

</body>
</html>
