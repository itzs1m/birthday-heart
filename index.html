<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: url("https://raw.githubusercontent.com/itzs1m/birthday-heart/main/eggfeleciano.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* 🌑 DARK OVERLAY FOR READABILITY */
body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.55);
  z-index: 0;
}

/* ❤️ HEART */
.heart {
  font-size: 260px;
  cursor: pointer;
  display: inline-block;
  animation: heartbeat 1.2s infinite;
  transition: opacity 0.5s;
  position: relative;
  z-index: 2;
}

.heart:hover {
  transform: scale(1.2);
}

/* 💬 MESSAGE */
.message {
  display: none;
  text-align: center;
  animation: fadeIn 1.5s ease-in-out;
  position: relative;
  z-index: 2;
  max-width: 600px;
  padding: 20px;
}

.message h1 {
  font-size: 40px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.9);
}

.message p {
  font-size: 20px;
  line-height: 1.5;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

a {
  color: pink;
  text-decoration: none;
  font-size: 20px;
}

/* 💓 HEARTBEAT ANIMATION */
@keyframes heartbeat {
  0%   { transform: scale(1); }
  20%  { transform: scale(1.25); }
  40%  { transform: scale(1); }
  60%  { transform: scale(1.25); }
  80%  { transform: scale(1); }
  100% { transform: scale(1); }
}

/* ✨ FADE IN */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

</style>

</head>

<body>

<div id="heart" class="heart">❤️</div>

<div id="message" class="message">
  <h1>Happy Birthday ❤️</h1>
  <p>You are amazing and I hope you like this gift.</p>
  <a href="YOUR_YOUTUBE_LINK_HERE" target="_blank">Watch this</a>
</div>

<!-- 🎵 MUSIC -->
<audio id="music">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
document.getElementById("heart").onclick = function() {

  document.getElementById("heart").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("heart").style.display = "none";
    document.getElementById("message").style.display = "block";
  }, 500);

  document.getElementById("music").play();
};
</script>

</body>
</html>
