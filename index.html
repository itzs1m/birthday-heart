<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: url("https://raw.githubusercontent.com/itzs1m/birthday-heart/main/eggfeleciano.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

.heart {
  font-size: 260px;
  cursor: pointer;
  display: inline-block;
  animation: heartbeat 1.2s infinite;
  transition: opacity .5s;
  position: relative;
  z-index: 2;
}

.message {
  display:none;
  text-align:center;
  animation:fadeIn 1.5s ease-in-out;
  position:relative;
  z-index:2;
  max-width:750px;
  padding:20px;
}

.crossword {
  display: inline-grid;
  grid-template-columns: repeat(6, 42px);
  gap: 6px;
  margin: 20px 0;
}

.cell {
  width: 42px;
  height: 42px;
  text-align: center;
  font-size: 22px;
  text-transform: uppercase;
  border: none;
  border-radius: 8px;
}

.empty {
  width: 42px;
  height: 42px;
}

.clues {
  text-align: left;
  display: inline-block;
  font-size: 16px;
}

button {
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:16px;
}

#wrong {
  display:none;
  color:#ffb3b3;
}

#videoLink {
  display:none;
  margin-top:20px;
  color:pink;
  text-decoration:none;
  font-size:22px;
}

@keyframes heartbeat {
  0%{transform:scale(1)}
  20%{transform:scale(1.25)}
  40%{transform:scale(1)}
  60%{transform:scale(1.25)}
  80%{transform:scale(1)}
  100%{transform:scale(1)}
}

@keyframes fadeIn {
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div id="heart" class="heart">❤️</div>

<div id="message" class="message">
  <h1>Happy Birthday ❤️</h1>
  <p>You are amazing and I hope you like this gift.</p>

  <h2>One little puzzle first 👀</h2>

  <div class="crossword">
    <input class="cell" id="l1" maxlength="1">
    <input class="cell" id="l2" maxlength="1">
    <input class="cell" id="l3" maxlength="1">
    <input class="cell" id="l4" maxlength="1">
    <div class="empty"></div>
    <div class="empty"></div>

    <input class="cell" id="n1" maxlength="1">
    <input class="cell" id="n2" maxlength="1">
    <input class="cell" id="n3" maxlength="1">
    <input class="cell" id="n4" maxlength="1">
    <div class="empty"></div>
    <div class="empty"></div>

    <input class="cell" id="e1" maxlength="1">
    <input class="cell" id="e2" maxlength="1">
    <input class="cell" id="e3" maxlength="1">
    <input class="cell" id="e4" maxlength="1">
    <div class="empty"></div>
    <div class="empty"></div>
  </div>

  <div class="clues">
    <p>1. The little white chaos queen</p>
    <p>2. Her favourite crime scene</p>
    <p>3. What we apparently became in this photo</p>
  </div>

  <br>
  <button onclick="checkAnswers()">Unlock ❤️</button>

  <p id="wrong">Not quite... try again 👀</p>

  <a id="videoLink" href="YOUR_YOUTUBE_LINK_HERE" target="_blank">
    Watch this ❤️
  </a>
</div>

<audio id="music">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
document.getElementById("heart").onclick = function() {
  document.getElementById("heart").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("heart").style.display = "none";
    document.getElementById("message").style.display = "block";
  }, 500);

  document.getElementById("music").play();
};

const cells = document.querySelectorAll(".cell");

cells.forEach((cell, index) => {
  cell.addEventListener("input", () => {
    cell.value = cell.value.toUpperCase();

    if (cell.value && cells[index + 1]) {
      cells[index + 1].focus();
    }
  });
});

function checkAnswers() {
  const luna =
    document.getElementById("l1").value +
    document.getElementById("l2").value +
    document.getElementById("l3").value +
    document.getElementById("l4").value;

  const nose =
    document.getElementById("n1").value +
    document.getElementById("n2").value +
    document.getElementById("n3").value +
    document.getElementById("n4").value;

  const eggs =
    document.getElementById("e1").value +
    document.getElementById("e2").value +
    document.getElementById("e3").value +
    document.getElementById("e4").value;

  if (
    luna.toLowerCase() === "luna" &&
    nose.toLowerCase() === "nose" &&
    eggs.toLowerCase() === "eggs"
  ) {
    document.getElementById("videoLink").style.display = "block";
    document.getElementById("wrong").style.display = "none";
  } else {
    document.getElementById("wrong").style.display = "block";
  }
}
</script>

</body>
</html>
