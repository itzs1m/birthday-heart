<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

.heart {
  font-size: 260px;
  cursor: pointer;
  display: inline-block;
  animation: heartbeat 1.2s infinite;
  transition: opacity 0.5s;
}

.heart:hover {
  transform: scale(1.2);
}

.message {
  display: none;
  text-align: center;
  animation: fadeIn 1.5s ease-in-out;
}

a {
  color: pink;
  text-decoration: none;
  font-size: 20px;
}

@keyframes heartbeat {
  0%   { transform: scale(1); }
  20%  { transform: scale(1.25); }
  40%  { transform: scale(1); }
  60%  { transform: scale(1.25); }
  80%  { transform: scale(1); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<div id="heart" class="heart">❤️</div>

<div id="message" class="message">
  <h1>Happy Birthday ❤️</h1>
  <p>You are amazing and I hope you like this gift.</p>
  <a href="YOUR_YOUTUBE_LINK_HERE" target="_blank">Watch this</a>
</div>

<!-- MUSIC -->
<audio id="music">
  <source src="https://soundcloud.com/thekidlaroi/love-again" type="audio/mpeg">
</audio>

<script>
document.getElementById("heart").onclick = function() {
  document.getElementById("heart").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("heart").style.display = "none";
    document.getElementById("message").style.display = "block";
  }, 500);

  document.getElementById("music").play();
};
</script>

</body>
</html>
