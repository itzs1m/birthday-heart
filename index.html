<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

.heart {
  font-size: 180px; /* BIGGER HEART */
  cursor: pointer;
  transition: transform 0.3s, opacity 0.5s;
}

.heart:hover {
  transform: scale(1.2);
}

.message {
  display: none;
  text-align: center;
  animation: fadeIn 1.5s ease-in-out;
}

a {
  color: pink;
  text-decoration: none;
  font-size: 20px;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>

</head>

<body>

<div id="heart" class="heart">❤️</div>

<div id="message" class="message">
  <h1>Happy Birthday ❤️</h1>
  <p>Thank you for all the moments we've shared.</p>
  <a href="YOUR_YOUTUBE_LINK_HERE" target="_blank">Watch this</a>
</div>

<!-- MUSIC -->
<audio id="music">
  <source src="YOUR_MUSIC_FILE_LINK_HERE" type="audio/mpeg">
</audio>

<script>
document.getElementById("heart").onclick = function() {
  document.getElementById("heart").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("heart").style.display = "none";
    document.getElementById("message").style.display = "block";
  }, 500);

  document.getElementById("music").play();
};
</script>

</body>
</html>
